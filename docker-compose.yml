version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ngo-postgres
    environment:
      POSTGRES_USER: ngo_user
      POSTGRES_PASSWORD: ngo_password
      POSTGRES_DB: ngo_meeting_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngo_user -d ngo_meeting_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ngo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ngo-backend
    environment:
      DATABASE_URL: postgresql://ngo_user:ngo_password@postgres:5432/ngo_meeting_db
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      LOG_LEVEL: INFO
      DEBUG: "false"
      APP_NAME: NGO Meeting Intelligence System
      APP_VERSION: "1.0.0"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - ngo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ngo-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: NGO Meeting Intelligence System
      NEXT_PUBLIC_APP_VERSION: "1.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - ngo-network

volumes:
  postgres_data:
    driver: local

networks:
  ngo-network:
    driver: bridge
